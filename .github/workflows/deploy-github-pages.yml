name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        env:
          VITE_BASE: /resume-flock/
        run: npm run build

      - name: Copy parsed resumes (static)
        run: |
          mkdir -p parsed_resumes
          node scripts/generate-parsed-resumes-index.mjs
          mkdir -p dist/parsed_resumes
          rsync -av --exclude="**/*.docx" --exclude="**/*.pdf" --exclude="**/*.html" parsed_resumes/ dist/parsed_resumes/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

