name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Attach build to the same environment as deploy so secrets stored under
    # Settings → Environments → github-pages are available (not only "Repository secrets").
    # If this job ever waits on "Required reviewers" for github-pages, move S3 secrets to repository secrets instead.
    environment:
      name: github-pages
    # Single source of truth: every step (verify + vite build) sees the same S3_* / AWS_* values.
    # Repository secrets: Settings → Secrets and variables → Actions.
    # You need ONE of these bundles (see modules/utils/paletteCatalogS3Url.mjs + .env.example):
    #   • S3_COLOR_PALETTES_JSON_URL  (full HTTPS URL to the .jsonl catalog)
    #   • OR S3_IMAGES_BUCKET + AWS_REGION + S3_PALETTES_JSONL_KEY
    #   • OR S3_BUCKET + S3_REGION + S3_COLOR_PALETTES_OBJECT_KEY  (legacy)
    env:
      S3_COLOR_PALETTES_JSON_URL: ${{ secrets.S3_COLOR_PALETTES_JSON_URL }}
      S3_IMAGES_BUCKET: ${{ secrets.S3_IMAGES_BUCKET }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_PALETTES_JSONL_KEY: ${{ secrets.S3_PALETTES_JSONL_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_COLOR_PALETTES_OBJECT_KEY: ${{ secrets.S3_COLOR_PALETTES_OBJECT_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail fast if env doesn’t resolve to a catalog URL (empty build = broken palettes on Pages).
      - name: Verify S3 palette catalog secrets
        run: node scripts/verify-palette-catalog-env.mjs

      - name: Build (Vite)
        env:
          VITE_BASE: /resume-flock/
        run: npm run build

      - name: Copy parsed resumes (static)
        run: |
          mkdir -p parsed_resumes
          node scripts/generate-parsed-resumes-index.mjs
          mkdir -p dist/parsed_resumes
          rsync -av --exclude="**/*.docx" --exclude="**/*.pdf" --exclude="**/*.html" parsed_resumes/ dist/parsed_resumes/

      - name: Copy static_content (icons/media/jobs/skills as applicable)
        run: |
          mkdir -p dist/static_content
          rsync -av static_content/ dist/static_content/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

