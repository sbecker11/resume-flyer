name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # S3 catalog: S3_COLOR_PALETTES_JSON_URL or CPM-aligned S3_IMAGES_BUCKET + AWS_REGION + S3_PALETTES_JSONL_KEY (see color-palette-utils-ts/DEVELOPMENT.md). Legacy secrets still supported.
      - name: Build (Vite)
        env:
          VITE_BASE: /resume-flock/
          S3_COLOR_PALETTES_JSON_URL: ${{ secrets.S3_COLOR_PALETTES_JSON_URL }}
          S3_IMAGES_BUCKET: ${{ secrets.S3_IMAGES_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_PALETTES_JSONL_KEY: ${{ secrets.S3_PALETTES_JSONL_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_COLOR_PALETTES_OBJECT_KEY: ${{ secrets.S3_COLOR_PALETTES_OBJECT_KEY }}
        run: npm run build

      - name: Copy parsed resumes (static)
        run: |
          mkdir -p parsed_resumes
          node scripts/generate-parsed-resumes-index.mjs
          mkdir -p dist/parsed_resumes
          rsync -av --exclude="**/*.docx" --exclude="**/*.pdf" --exclude="**/*.html" parsed_resumes/ dist/parsed_resumes/

      - name: Copy static_content (icons/media/jobs/skills as applicable)
        run: |
          mkdir -p dist/static_content
          rsync -av static_content/ dist/static_content/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

