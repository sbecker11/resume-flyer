<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>resume-flyer README Preview</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e7ebf3;
      --muted: #aeb8c8;
      --link: #8fc2ff;
      --border: #2a3040;
      --code-bg: #11151d;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 18px 48px;
    }
    .doc {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      line-height: 1.6;
    }
    .doc h1, .doc h2, .doc h3, .doc h4 {
      line-height: 1.25;
    }
    .doc img {
      max-width: 100%;
      height: auto;
    }
    .doc a {
      color: var(--link);
    }
    .doc code {
      background: var(--code-bg);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
    .doc pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
    }
    .error {
      color: #ff9f9f;
      white-space: pre-wrap;
    }
    .doc-top-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 12px;
    }
    /* Match .biz-resume-div .r-div-close (ResumeContainer.vue) */
    .doc-top-row .r-div-close {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      color: #c00;
      background: #fff;
      border: 1px solid #c00;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .doc-top-row .r-div-close:hover {
      color: #f00;
      border-color: #f00;
      background: rgba(255, 255, 255, 0.9);
    }
    .doc-top-row .r-div-close:focus {
      outline: 2px solid var(--link);
      outline-offset: 2px;
    }
    .doc-top-row > h1 {
      margin: 0;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <article id="doc" class="doc">Loading README…</article>
  </div>

  <script type="module">
    import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';

    const target = document.getElementById('doc');
    const sourceUrl = 'https://raw.githubusercontent.com/sbecker11/resume-flyer/master/README.md';

    try {
      const response = await fetch(sourceUrl, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Failed to load README: ${response.status}`);
      const md = await response.text();
      target.innerHTML = marked.parse(md);
      mountCloseButtonInTopRow();
    } catch (error) {
      target.innerHTML = `<div class="error">Unable to load README preview.\n\n${String(error)}</div>`;
      mountCloseButtonInTopRow();
    }

    function closeReadmePreview() {
      window.close();
    }

    function createCloseButton() {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'r-div-close';
      button.id = 'readme-close-btn';
      button.setAttribute('aria-label', 'Close README preview tab');
      button.title = 'Closes this tab when opened from the app (About -> Open README preview)';
      button.textContent = '×';
      button.addEventListener('click', closeReadmePreview);
      return button;
    }

    function mountCloseButtonInTopRow() {
      if (!target) return;
      const firstHeading = target.querySelector('h1');
      const existingRow = target.querySelector('.doc-top-row');
      if (existingRow) return;

      const topRow = document.createElement('div');
      topRow.className = 'doc-top-row';
      const button = createCloseButton();

      if (firstHeading && firstHeading.parentElement === target) {
        target.insertBefore(topRow, firstHeading);
        topRow.appendChild(firstHeading);
        topRow.appendChild(button);
        return;
      }

      target.insertBefore(topRow, target.firstChild);
      topRow.appendChild(button);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeReadmePreview();
    });
  </script>
</body>
</html>
