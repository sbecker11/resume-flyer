<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewPort"
        content="width=device-width,
        initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible"
        content="ie=edge"/>

  <title>Resume Flyer (local)</title>
  <!-- Base-relative so GitHub Pages (VITE_BASE /repo/) resolves correctly; avoids /favicon.ico 404 at site root -->
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />

  <link rel="stylesheet" href="./styles/styles.css">
  <link rel="stylesheet" href="./styles/core.css">
  <link rel="stylesheet" href="./styles/scene.css">
  <link rel="stylesheet" href="./styles/controls.css"> 
  <link rel="stylesheet" href="./styles/timeline.css">

</head>

<body>

  <div id="app"></div>

  <!-- Load Vue app -->
   <script>
    window.CONSOLE_LOG_IGNORE = () => {};
    window.CONSOLE_LOG_DISABLED = () => {};
    window.CONSOLE_INFO_IGNORE = () => {};
    
    // Early logging control initialization
    window.EARLY_LOG_SUPPRESSION = true;
    if (window.EARLY_LOG_SUPPRESSION) {
      // Console overrides removed
    }
   </script>
  
  <script>
    (function setRuntimeTitle() {
      const host = window.location.hostname || '';
      document.title = host.endsWith('github.io')
        ? 'Resume Flyer (@githubpages)'
        : 'Resume Flyer (local)';
    })();
  </script>

  <script type="module" src="/main.ts"></script>


  <!-- The legacy main.mjs is now disabled. All initialization is handled by main.ts -->
  <!-- <script type="module" src="/main.mjs"></script> -->

</body>

</html>
