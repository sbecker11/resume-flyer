<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>resume-flock README Preview</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e7ebf3;
      --muted: #aeb8c8;
      --link: #8fc2ff;
      --border: #2a3040;
      --code-bg: #11151d;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px 18px 48px;
    }
    .header {
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
    }
    .doc {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      line-height: 1.6;
    }
    .doc h1, .doc h2, .doc h3, .doc h4 {
      line-height: 1.25;
    }
    .doc img {
      max-width: 100%;
      height: auto;
    }
    .doc a {
      color: var(--link);
    }
    .doc code {
      background: var(--code-bg);
      padding: 0.1em 0.35em;
      border-radius: 4px;
    }
    .doc pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
    }
    .error {
      color: #ff9f9f;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">README preview (standalone)</div>
    <article id="doc" class="doc">Loading README…</article>
  </div>

  <script type="module">
    import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';

    const target = document.getElementById('doc');
    const sourceUrl = 'https://raw.githubusercontent.com/sbecker11/resume-flock/master/README.md';

    try {
      const response = await fetch(sourceUrl, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Failed to load README: ${response.status}`);
      const md = await response.text();
      target.innerHTML = marked.parse(md);
    } catch (error) {
      target.innerHTML = `<div class="error">Unable to load README preview.\n\n${String(error)}</div>`;
    }
  </script>
</body>
</html>
